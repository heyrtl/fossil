[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fossil-sdk"
version = "0.1.0"
description = "Semantic failure memory for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["ai", "agents", "llm", "memory", "observability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "numpy>=1.26.0",
]

[project.optional-dependencies]
local = [
    "sentence-transformers>=3.0.0",
]
openai = [
    "openai>=1.0.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
]

[project.urls]
Homepage = "https://github.com/heyrtl/fossil"
Repository = "https://github.com/heyrtl/fossil"
Issues = "https://github.com/heyrtl/fossil/issues"

[tool.hatch.build.targets.wheel]
packages = ["fossil"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]